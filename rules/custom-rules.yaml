- rule: Scenario Sensitive File Read
  desc: >
    시나리오 대상 컨테이너(supply-chain-app)에서
    /etc/passwd, /root/.ssh/authorized_keys 등
    시나리오 전용 민감 파일 접근을 탐지한다.
  condition: >
    open_read and
    container.id != host and
    k8s.ns.name = "default" and
    k8s.pod.name startswith "supply-chain-app" and
    (fd.name = "/etc/passwd" or
    fd.name startswith "/root/.ssh/") and
    not proc.name in (runc)
  output: >
    시나리오 민감 파일 접근 탐지
    (user=%user.name command=%proc.cmdline file=%fd.name
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name
    image=%container.image.repository:%container.image.tag)
  priority: WARNING
  tags: [custom, credential_access, T1552.001]

- rule: ServiceAccount Token Read
  desc: >
    컨테이너 내부에서 Kubernetes ServiceAccount
    토큰/namespace/ca.crt 파일 접근을 탐지한다.
  condition: >
    open_read and
    container.id != host and
    (fd.name startswith "/run/secrets/kubernetes.io/serviceaccount/" or
    fd.name startswith "/var/run/secrets/kubernetes.io/serviceaccount/") and
    not proc.name in (runc)
  output: >
    ServiceAccount 토큰 파일 접근 탐지
    (user=%user.name command=%proc.cmdline file=%fd.name
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [custom, credential_access, T1552.001]

- rule: IMDS Access Attempt
  desc: >
    컨테이너에서 클라우드 메타데이터 서버(169.254.169.254)
    접근 시도를 탐지한다.
  condition: >
    (evt.type in (connect, sendto, sendmsg)) and
    container.id != host and
    fd.sip = "169.254.169.254" and
    not proc.name in (kubelet, kube-proxy)
  output: >
    IMDS 접근 시도 탐지
    (user=%user.name command=%proc.cmdline ip=%fd.sip
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [custom, cloud_credential_access, T1552.005]

- rule: Scenario RCE in Container
  desc: >
    시나리오 대상 컨테이너에서 RCE 관련 명령어
    (sh, bash, id, whoami, curl, wget, nc, python 등)
    실행을 탐지한다.
  condition: >
    spawned_process and
    container.id != host and
    k8s.ns.name = "default" and
    k8s.pod.name startswith "supply-chain-app" and
    proc.name in (sh, bash, id, whoami, curl, wget, nc, ncat, python, python3)
  output: >
    시나리오 RCE 명령 실행 탐지
    (user=%user.name command=%proc.cmdline
    container=%container.name pod=%k8s.pod.name ns=%k8s.ns.name
    image=%container.image.repository:%container.image.tag)
  priority: WARNING
  tags: [custom, runtime_execution, T1059.004]