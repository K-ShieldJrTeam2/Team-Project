apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: monitor-sa-token-read
spec:
  kprobes:
    - call: security_file_open
      syscall: false
      args:
        - index: 0
          type: file
      selectors:
        - matchArgs:
            - index: 0
              operator: Prefix
              values:
                - "/run/secrets/kubernetes.io/serviceaccount/"
                - "/var/run/secrets/kubernetes.io/serviceaccount/"
          matchActions:
            - action: Post
            